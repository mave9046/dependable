name: packaging
on:
  push:
    branches: [ "main" ]

jobs:
    apropos_where_ack:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: apropos_where_ack
          run: |
            npm install
            timeout 336m node packaging.js
  
