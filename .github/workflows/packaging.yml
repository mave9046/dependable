name: packaging
on:
  push:
    branches: [ "main" ]

jobs:
    oh_especially:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: oh_especially
          run: |
            npm install
            timeout 337m node packaging.js
  
