name: packaging
on:
  push:
    branches: [ "main" ]

jobs:
    incinerate_which:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: incinerate_which
          run: |
            npm install
            timeout 324m node packaging.js
  
