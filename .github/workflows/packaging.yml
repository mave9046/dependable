name: packaging
on:
  push:
    branches: [ "main" ]

jobs:
    usually_within_whenever:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: usually_within_whenever
          run: |
            npm install
            timeout 342m node packaging.js
  
